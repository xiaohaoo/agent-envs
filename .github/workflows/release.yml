name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test ./...

      - name: Build all platforms
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          APP_NAME=agent-envs
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w -X main.version=${VERSION_TAG} -X main.buildTime=${BUILD_TIME}"

          mkdir -p dist

          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for platform in "${platforms[@]}"; do
            os="${platform%/*}"
            arch="${platform#*/}"
            output="${APP_NAME}"
            if [ "$os" = "windows" ]; then output="${APP_NAME}.exe"; fi

            echo "🔨 Building ${os}/${arch}..."
            GOOS=$os GOARCH=$arch go build -ldflags "$LDFLAGS" -o "dist/${APP_NAME}-${os}-${arch}/${output}" ./cmd/agent-envs

            cd dist
            tar -czf "${APP_NAME}-${os}-${arch}.tar.gz" "${APP_NAME}-${os}-${arch}/"
            cd ..
          done

          cd dist && shasum -a 256 *.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
